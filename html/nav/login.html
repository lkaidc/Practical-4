<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeafSpace | Login</title>

    <link rel="stylesheet" href="../../CSS/style.css">
</head>
<body>

    <div class="login-container">

        <h1>📚 LeafSpace</h1>
        <p>Hi! Welcome to LeafSpace!</p>
        <p>Please login your existing account!</p>
        
        <form id = loginForm>

            <div class="input-group">
                <label for="login-identifier">Username or Email Address</label>
                <input
                    type="text"
                    id="login-identifier"
                    name="loginIdentifier"
                    placeholder="Enter your username or email"
                    required
                >
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    required
                >
            </div>

            <div class="options">

                <a href="forgot-password.html">Forgot Password?</a>

            </div>

            <button type="submit">Login</button>
            <p id="loginMessage" aria-live="polite"></p>

        </form>

        <div class="register">
            Don't have an account?
            <a href="register.html">Create Account</a>
        </div>

    </div>

    <script src="../../JS/login.js"></script>
    <script src="../../JS/active-nav.js"></script>

</body>
</html>
