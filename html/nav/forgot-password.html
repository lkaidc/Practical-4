<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Reset your LeafSpace account password."
    >

    <title>Forgot Password | LeafSpace</title>

    <link rel="icon" type="image/png" href="../../images/clearlogo.png">
    <link rel="stylesheet" href="../../CSS/style.css">
</head>

<body class="account-page" data-theme="light">

    <main class="login-container">

        <div class="account-brand">
            <img src="../../images/clearlogo.png" alt="LeafSpace Logo">
            <h1>LeafSpace</h1>
        </div>

        <h1>
            <span style="font-size: 0.8em;">Forgot Password</span>
        </h1>

        <p>
            Enter the email address connected to your
            LeafSpace account.
        </p>

        <form id="forgotPasswordForm">

            <div class="input-group">
                <label for="reset-email">
                    Email Address
                </label>

                <input
                    type="email"
                    id="reset-email"
                    name="email"
                    placeholder="Enter your registered email"
                    required
                >
            </div>

            <div class="input-group">
                <label for="new-password">
                    New Password
                </label>

                <input
                    type="password"
                    id="new-password"
                    name="newPassword"
                    placeholder="Enter your new password"
                    minlength="6"
                    required
                >
            </div>

            <div class="input-group">
                <label for="confirm-new-password">
                    Confirm New Password
                </label>

                <input
                    type="password"
                    id="confirm-new-password"
                    name="confirmNewPassword"
                    placeholder="Confirm your new password"
                    minlength="6"
                    required
                >
            </div>

            <button type="submit">
                Reset Password
            </button>

            <p
                id="resetMessage"
                aria-live="polite"
            ></p>

        </form>

        <div class="register">
            Remember your password?
            <a href="login.html">Return to Login</a>
        </div>

    </main>

    <script src="../../JS/forgot-password.js"></script>
    <script src="../../JS/active-nav.js"></script>

</body>
</html>
